name: Build

on:
  workflow_dispatch:
    inputs:
      base_link:
        description: "fw link"
        required: false
        type: string
        
env:
  BASE_LINK: ${{ inputs.base_link || secrets.BASE_LINK }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -a -f
          df -h

      - name: Run build script
        run: ./build.sh
        env:
          BASE_LINK: ${{ env.BASE_LINK }}

      - name: List output images
        run: ls -lh out/

      - name: Upload images as artifact
        uses: actions/upload-artifact@v4
        with:
          name: miatoll-coloros-images
          path: out/*.img
          retention-days: 7
          if-no-files-found: error
