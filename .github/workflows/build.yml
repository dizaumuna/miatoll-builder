name: Build

on:
  workflow_dispatch:
    inputs:
      BASE_FW:
        description: "The firmware of OnePlus."
        required: false
        type: string
        
env:
  BASE_FW: ${{ inputs.BASE_FW || secrets.BASE_FW }}

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 180
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run build script
        run: ./build.sh
        env:
          BASE_FW: ${{ env.BASE_FW }}

      - name: List output images
        run: ls -lh out/

      - name: Upload images as artifact
        uses: actions/upload-artifact@v4
        with:
          name: miatoll-coloros-images
          path: out/*.img
          retention-days: 7
          if-no-files-found: error
