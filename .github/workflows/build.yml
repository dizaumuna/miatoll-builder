name: miatoll-builder

on:
  workflow_dispatch:
    inputs:
      source_firmware_url:
        description: "Source firmware zip URL"
        required: true
        type: string
      is_hyperos:
        description: "Target OS is HyperOS"
        required: true
        type: boolean
        default: false
      is_oxygenos:
        description: "Target OS is OxygenOS"
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SOURCE_FIRMWARE_URL: ${{ github.event.inputs.source_firmware_url }}
      IS_HYPEROS: ${{ github.event.inputs.is_hyperos }}
      IS_OXYGENOS: ${{ github.event.inputs.is_oxygenos }}
      VENDOR_PAT: ${{ secrets.VENDOR_PAT }}
    steps:
      - name: Free disk space (1/3)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a

      - name: Free disk space (2/3)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Free disk space (3/3)
        uses: rokibhasansagar/slimhub_actions@main
        with:
          retain: 'compiler_cmake'
          
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y aria2 unzip wget git

      - name: Download source firmware
        run: bash scripts/download_fw.sh

      - name: Extract payload
        run: bash scripts/extract_payload.sh

      - name: Download tools
        run: bash scripts/download_tools.sh

      - name: Dump source images
        run: bash scripts/dump_images.sh

      - name: Clone target vendor
        run: bash scripts/clone_vendor.sh

      - name: Extract source images
        run: bash scripts/extract_images.sh

      - name: Port OxygenOS
        if: ${{ github.event.inputs.is_oxygenos == 'true' }}
        run: bash scripts/port_oxygenos.sh

      - name: Port HyperOS
        if: ${{ github.event.inputs.is_hyperos == 'true' }}
        run: bash scripts/port_hyperos.sh

      - name: Build ext4 images
        run: bash scripts/build_images.sh

      - name: Build super.img
        run: bash scripts/build_super.sh
